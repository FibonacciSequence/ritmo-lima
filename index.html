<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0e0b08">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ritmo Lima">
<title>Ritmo Lima</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════ */
:root {
  --bg:       #0d0a07;
  --bg2:      #161210;
  --bg3:      #1f1914;
  --bg4:      #28201a;
  --card:     #1a1410;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.13);
  --border3:  rgba(255,255,255,0.22);
  --text:     #f2ecdb;
  --text2:    #b8aa96;
  --muted:    #7a6e5e;
  --accent:   #e55c18;
  --accent-h: #cc4f13;
  --gold:     #e9a82e;
  --gold-dim: #a97820;
  --green:    #2d8c5e;
  --radius:   10px;
  --radius-lg: 16px;
  --nav-h:    56px;
  --safe-b:   env(safe-area-inset-bottom, 0px);
}

/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html { height:100%; overflow:hidden; }
body {
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100%;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ═══════════════════════════════════════════
   APP SHELL
═══════════════════════════════════════════ */
#app-header {
  flex-shrink:0;
  height:var(--nav-h);
  background:rgba(13,10,7,0.92);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 1rem;
  position:relative;
  z-index:50;
}
.header-logo {
  font-family:'Playfair Display',serif;
  font-style:italic;
  font-size:1.35rem;
  color:var(--accent);
  letter-spacing:-0.5px;
  cursor:pointer;
  flex-shrink:0;
}
.header-search-wrap {
  flex:1;
  max-width:320px;
  margin:0 1rem;
  position:relative;
}
.header-search {
  width:100%;
  background:var(--bg3);
  border:1px solid var(--border2);
  border-radius:8px;
  padding:7px 12px 7px 34px;
  font-family:'DM Sans',sans-serif;
  font-size:0.82rem;
  color:var(--text);
  outline:none;
  transition:border-color 0.2s;
}
.header-search::placeholder { color:var(--muted); }
.header-search:focus { border-color:var(--border3); }
.search-icon {
  position:absolute; left:10px; top:50%; transform:translateY(-50%);
  color:var(--muted); pointer-events:none; font-size:14px;
}
.header-fav-btn {
  background:none; border:none; color:var(--muted);
  cursor:pointer; font-size:1.2rem; padding:6px;
  transition:color 0.2s; flex-shrink:0;
}
.header-fav-btn:hover { color:var(--gold); }

/* ═══════════════════════════════════════════
   SCROLL AREA
═══════════════════════════════════════════ */
#scroll-area {
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  scroll-behavior:smooth;
}
#scroll-area::-webkit-scrollbar { width:4px; }
#scroll-area::-webkit-scrollbar-track { background:transparent; }
#scroll-area::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* ═══════════════════════════════════════════
   BOTTOM NAV
═══════════════════════════════════════════ */
#bottom-nav {
  flex-shrink:0;
  height:calc(56px + var(--safe-b));
  background:rgba(13,10,7,0.96);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--border);
  display:flex;
  align-items:flex-start;
  padding-top:6px;
  padding-bottom:var(--safe-b);
}
.nav-tab {
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
  padding:4px 0;
  cursor:pointer;
  background:none;
  border:none;
  color:var(--muted);
  transition:color 0.18s;
  font-family:'DM Sans',sans-serif;
}
.nav-tab.active { color:var(--accent); }
.nav-tab svg { width:22px; height:22px; }
.nav-tab span { font-size:0.62rem; font-weight:500; letter-spacing:0.04em; text-transform:uppercase; }

/* ═══════════════════════════════════════════
   PAGES
═══════════════════════════════════════════ */
.page { display:none; padding-bottom:1rem; }
.page.active { display:block; }

/* ═══════════════════════════════════════════
   SEARCH RESULTS OVERLAY
═══════════════════════════════════════════ */
#search-results {
  position:absolute;
  top:var(--nav-h);
  left:0; right:0;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  z-index:40;
  max-height:70vh;
  overflow-y:auto;
  display:none;
}
#search-results.open { display:block; }
.sr-item {
  display:flex; align-items:center; gap:12px;
  padding:12px 1rem;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  transition:background 0.15s;
}
.sr-item:hover { background:var(--bg3); }
.sr-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.sr-info { flex:1; min-width:0; }
.sr-name { font-size:0.85rem; font-weight:500; color:var(--text); }
.sr-meta { font-size:0.72rem; color:var(--muted); }

/* ═══════════════════════════════════════════
   HERO (HOME)
═══════════════════════════════════════════ */
.home-hero {
  position:relative;
  padding:2.5rem 1.25rem 2rem; text-align:center; display:flex; flex-direction:column; align-items:center;
  overflow:hidden;
}
.home-hero-bg {
  position:absolute; inset:0; pointer-events:none;
  background:
    radial-gradient(ellipse 70% 70% at 80% 20%, rgba(229,92,24,0.15) 0%, transparent 65%),
    radial-gradient(ellipse 50% 50% at 10% 80%, rgba(200,57,43,0.09) 0%, transparent 55%);
}
.home-hero-grid {
  position:absolute; inset:0; pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse at 50% 50%,black 20%,transparent 75%);
}
.hero-eyebrow {
  position:relative;
  font-size:0.68rem; font-weight:500; letter-spacing:0.2em;
  text-transform:uppercase; color:var(--accent);
  margin-bottom:0.75rem;
  display:flex; align-items:center; gap:10px;
}
.hero-eyebrow::before { content:''; width:28px; height:1px; background:var(--accent); }
.hero-title {
  position:relative;
  font-family:'Playfair Display',serif;
  font-size:clamp(2.2rem,7vw,3.8rem);
  font-weight:900; line-height:0.95;
  letter-spacing:-1.5px; color:var(--text);
  margin-bottom:1rem;
}
.hero-title em { font-style:italic; color:var(--accent); display:block; }
.hero-sub {
  position:relative;
  font-size:0.88rem; font-weight:300; color:var(--text2);
  line-height:1.65; margin-bottom:1.5rem; max-width:420px;
}
.hero-stats-row {
  position:relative;
  display:flex; gap:1.5rem; margin-bottom:1.75rem;
}
.hstat { text-align:center; display:flex; flex-direction:column; align-items:center; }
.hstat-n {
  font-family:'Playfair Display',serif;
  font-size:1.8rem; font-weight:700; color:var(--gold); line-height:1;
}
.hstat-l { font-size:0.62rem; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); }
.hero-cta-row { display:flex; gap:10px; flex-wrap:wrap; }
.btn-primary {
  padding:0.7rem 1.5rem;
  background:var(--accent); color:#fff;
  font-family:'DM Sans',sans-serif;
  font-size:0.85rem; font-weight:500;
  border:none; border-radius:6px; cursor:pointer;
  transition:background 0.18s,transform 0.1s;
  text-decoration:none; display:inline-block;
}
.btn-primary:hover { background:var(--accent-h); transform:translateY(-1px); }
.btn-ghost {
  padding:0.7rem 1.5rem;
  background:transparent; color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:0.85rem; font-weight:500;
  border:1px solid var(--border2); border-radius:6px; cursor:pointer;
  transition:border-color 0.18s,transform 0.1s;
  text-decoration:none; display:inline-block;
}
.btn-ghost:hover { border-color:var(--border3); transform:translateY(-1px); }

/* ── HOME SECTIONS ── */
.home-section { padding:1.5rem 1.25rem 0; }
.home-section-header {
  display:flex; align-items:baseline; justify-content:space-between;
  margin-bottom:1rem;
}
.home-section-title {
  font-family:'Playfair Display',serif;
  font-size:1.25rem; font-weight:700; color:var(--text);
}
.see-all {
  font-size:0.75rem; color:var(--accent); cursor:pointer;
  background:none; border:none; font-family:'DM Sans',sans-serif;
  transition:opacity 0.15s;
}
.see-all:hover { opacity:0.7; }

/* horizontal scroll strip */
.h-scroll { display:flex; gap:12px; overflow-x:auto; padding-bottom:8px; scroll-snap-type:x mandatory; }
.h-scroll::-webkit-scrollbar { display:none; }

/* ── TODAY CARDS ── */
.today-card {
  flex-shrink:0; width:200px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:1rem;
  scroll-snap-align:start;
  cursor:pointer; transition:border-color 0.18s,transform 0.15s;
  border-left:3px solid var(--sc);
  position:relative; overflow:hidden;
}
.today-card:hover { border-color:var(--sc); transform:translateY(-2px); }
.today-card-school { font-size:0.68rem; font-weight:500; color:var(--sc); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:4px; }
.today-card-time { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:700; color:var(--text); line-height:1; margin-bottom:4px; }
.today-card-estilo { font-size:0.82rem; color:var(--text2); margin-bottom:2px; }
.today-card-nivel { font-size:0.7rem; color:var(--muted); }
.today-card-sede { font-size:0.68rem; color:var(--muted); margin-top:8px; line-height:1.4; }
.no-today { font-size:0.85rem; color:var(--muted); font-style:italic; padding:0.5rem 0; }

/* ── ESCOLA MINI CARD ── */
.school-mini {
  flex-shrink:0; width:200px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:1rem;
  scroll-snap-align:start;
  cursor:pointer; transition:all 0.18s;
  position:relative; overflow:hidden;
}
.school-mini::before {
  content:'';
  position:absolute; top:0; left:0; right:0;
  height:3px; background:var(--sc);
}
.school-mini:hover { border-color:var(--border2); transform:translateY(-2px); }
.sm-rank {
  font-family:'Playfair Display',serif;
  font-size:2rem; font-weight:900; color:var(--sc);
  opacity:0.12; position:absolute; top:4px; right:10px; line-height:1;
}
.sm-name { font-size:0.9rem; font-weight:500; color:var(--text); margin-bottom:4px; line-height:1.3; }
.sm-sedes { font-size:0.7rem; color:var(--muted); margin-bottom:8px; line-height:1.5; }
.sm-tags { display:flex; flex-wrap:wrap; gap:4px; }
.sm-tag {
  font-size:0.6rem; padding:2px 7px;
  border-radius:2px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  color:var(--muted);
}
.fav-star {
  position:absolute; top:10px; right:10px;
  font-size:0.95rem; cursor:pointer; z-index:2;
  transition:transform 0.2s;
}
.fav-star:hover { transform:scale(1.3); }

/* ═══════════════════════════════════════════
   SCHOOLS PAGE
═══════════════════════════════════════════ */
.page-header {
  padding:1.5rem 1.25rem 1rem;
  border-bottom:1px solid var(--border);
}
.page-title {
  font-family:'Playfair Display',serif;
  font-size:1.6rem; font-weight:700; color:var(--text);
  margin-bottom:0.25rem;
}
.page-subtitle { font-size:0.82rem; color:var(--muted); }

.filter-chips { display:flex; gap:8px; overflow-x:auto; padding:1rem 1.25rem 0; }
.filter-chips::-webkit-scrollbar { display:none; }
.chip {
  flex-shrink:0;
  padding:5px 14px;
  font-size:0.75rem; font-weight:500;
  border-radius:20px; border:1px solid var(--border2);
  background:transparent; color:var(--muted); cursor:pointer;
  transition:all 0.15s; font-family:'DM Sans',sans-serif;
  white-space:nowrap;
}
.chip.on { background:var(--accent); border-color:var(--accent); color:#fff; }
.chip:hover:not(.on) { border-color:var(--border3); color:var(--text); }

.schools-list { padding:1rem 1.25rem; display:flex; flex-direction:column; gap:10px; }
.school-row {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:1.1rem 1.1rem 1.1rem 0.9rem;
  display:flex; gap:1rem; align-items:flex-start;
  cursor:pointer; transition:all 0.18s;
  position:relative; overflow:hidden;
}
.school-row::before {
  content:''; position:absolute; left:0; top:0; bottom:0;
  width:3px; background:var(--sc); border-radius:3px 0 0 3px;
  transition:width 0.2s;
}
.school-row:hover { border-color:var(--border2); transform:translateX(2px); }
.school-row:hover::before { width:5px; }
.school-row-num {
  font-family:'Playfair Display',serif;
  font-size:1.4rem; font-weight:700; color:var(--sc); opacity:0.5;
  line-height:1; flex-shrink:0; min-width:28px;
}
.school-row-body { flex:1; min-width:0; }
.school-row-name { font-size:0.95rem; font-weight:500; color:var(--text); margin-bottom:3px; }
.school-row-sedes { font-size:0.72rem; color:var(--muted); margin-bottom:6px; }
.school-row-tags { display:flex; flex-wrap:wrap; gap:4px; }
.school-row-right { flex-shrink:0; display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
.school-row-fav { font-size:1rem; cursor:pointer; transition:transform 0.18s; }
.school-row-fav:hover { transform:scale(1.25); }
.school-row-chevron { color:var(--muted); font-size:0.85rem; }

/* ═══════════════════════════════════════════
   SCHOOL DETAIL PAGE
═══════════════════════════════════════════ */
.detail-hero {
  padding:1.5rem 1.25rem 1.25rem;
  position:relative; overflow:hidden;
  border-bottom:1px solid var(--border);
}
.detail-hero-bg {
  position:absolute; inset:0; pointer-events:none;
  opacity:0.08;
}
.detail-back {
  display:flex; align-items:center; gap:6px;
  font-size:0.78rem; color:var(--muted); cursor:pointer;
  background:none; border:none; font-family:'DM Sans',sans-serif;
  margin-bottom:1rem; transition:color 0.15s;
}
.detail-back:hover { color:var(--text); }
.detail-color-bar { width:48px; height:4px; border-radius:2px; margin-bottom:1rem; }
.detail-name {
  font-family:'Playfair Display',serif;
  font-size:1.8rem; font-weight:900; color:var(--text);
  line-height:1.1; margin-bottom:0.5rem;
}
.detail-sedes { font-size:0.82rem; color:var(--text2); margin-bottom:0.75rem; }
.detail-nota { font-size:0.8rem; color:var(--muted); font-style:italic; margin-bottom:1rem; }
.detail-actions { display:flex; gap:10px; flex-wrap:wrap; }
.detail-action-btn {
  display:flex; align-items:center; gap:7px;
  padding:8px 16px;
  background:var(--bg3); border:1px solid var(--border2);
  border-radius:6px; cursor:pointer; font-family:'DM Sans',sans-serif;
  font-size:0.8rem; color:var(--text2); transition:all 0.15s;
}
.detail-action-btn:hover { border-color:var(--border3); color:var(--text); }

.detail-section { padding:1.25rem 1.25rem 0; }
.detail-section-title {
  font-size:0.68rem; font-weight:500; letter-spacing:0.15em;
  text-transform:uppercase; color:var(--muted); margin-bottom:0.75rem;
}
.estilo-pills { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:1.25rem; }
.estilo-pill {
  padding:6px 14px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:4px;
  font-size:0.78rem; color:var(--text2);
}
.sede-chip {
  display:flex; align-items:center; gap:8px;
  padding:10px 12px;
  background:var(--bg3); border:1px solid var(--border);
  border-radius:8px; margin-bottom:8px;
  font-size:0.82rem; color:var(--text2);
}
.sede-chip-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.detail-classes { display:flex; flex-direction:column; gap:8px; margin-bottom:1.25rem; }
.detail-class-card {
  background:var(--bg3); border:1px solid var(--border);
  border-radius:8px; padding:12px;
  border-left:3px solid var(--sc);
}
.dc-row1 { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
.dc-time { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700; color:var(--text); }
.dc-day { font-size:0.75rem; color:var(--muted); }
.dc-estilo { font-size:0.85rem; color:var(--text2); margin-bottom:2px; }
.dc-meta { font-size:0.72rem; color:var(--muted); }

/* ═══════════════════════════════════════════
   CALENDAR PAGE
═══════════════════════════════════════════ */
.cal-header { padding:1.25rem 1.25rem 0; }
.cal-week-nav {
  display:flex; align-items:center; gap:10px;
  background:var(--bg3); border:1px solid var(--border);
  border-radius:8px; padding:8px 12px;
  margin-bottom:1rem;
}
.cal-week-nav button {
  background:none; border:none; color:var(--muted);
  font-size:1rem; cursor:pointer; padding:0 4px;
  transition:color 0.15s; line-height:1;
}
.cal-week-nav button:hover { color:var(--text); }
.cal-week-nav span {
  flex:1; text-align:center; display:flex; flex-direction:column; align-items:center;
  font-size:0.82rem; font-weight:500; color:var(--text);
}
.cal-filters { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; }
.cal-filters::-webkit-scrollbar { display:none; }
.legend-row { display:flex; flex-wrap:wrap; gap:7px; padding:0.75rem 1.25rem 0; }
.leg {
  display:flex; align-items:center; gap:6px;
  font-size:0.68rem; color:var(--muted);
  padding:4px 9px; border-radius:20px;
  border:1px solid var(--border); cursor:pointer;
  transition:all 0.15s; user-select:none;
}
.leg:hover { border-color:var(--border2); color:var(--text); }
.leg.off { opacity:0.28; }
.leg-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.cal-grid {
  display:grid;
  grid-template-columns:repeat(7,minmax(0,1fr));
  gap:1px;
  background:var(--border);
  border:1px solid var(--border);
  border-radius:8px;
  overflow:hidden;
  margin:0.75rem 1.25rem 0;
}
.day-col { background:var(--bg2); display:flex; flex-direction:column; }
.day-head {
  font-size:0.6rem; font-weight:500; letter-spacing:0.06em;
  text-transform:uppercase; color:var(--muted);
  text-align:center; display:flex; flex-direction:column; align-items:center; padding:8px 2px 6px;
  background:var(--bg3); border-bottom:1px solid var(--border);
  line-height:1.3;
}
.day-head.today { color:var(--accent); background:rgba(229,92,24,0.1); }
.day-body { flex:1; padding:4px; display:flex; flex-direction:column; gap:3px; min-height:180px; }
.cpill {
  border-radius:3px; padding:5px 6px;
  cursor:pointer; transition:opacity 0.12s;
  border-left:2px solid var(--pc);
  background:color-mix(in srgb,var(--pc) 12%,var(--bg));
}
.cpill:hover { opacity:0.82; }
.cpill-s { font-size:0.56rem; font-weight:500; color:var(--pc); line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cpill-t { font-size:0.65rem; font-weight:500; color:var(--text); }
.cpill-e { font-size:0.6rem; color:var(--text2); }
.cpill-n { font-size:0.55rem; color:var(--muted); margin-top:1px; }
.no-class {
  font-size:0.65rem; color:var(--border2);
  text-align:center; display:flex; flex-direction:column; align-items:center; padding:1rem 0; margin:auto;
}

/* ═══════════════════════════════════════════
   FAVORITES PAGE
═══════════════════════════════════════════ */
.fav-empty {

  {sid:10,day:5,hora:"19:00",estilo:"Street Jazz",nivel:"Intermedio",prof:"Instr. TFS",sede:"San Miguel – Av. La Marina"},
  {sid:10,day:6,hora:"10:00",estilo:"Hip Hop",nivel:"Básico",prof:"Instr. TFS",sede:"San Miguel – Av. La Marina"},
];


const DAYS_ES = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
const MAIN_ESTILOS = ["Salsa","Bachata","Salsa Cubana","Merengue","Hip Hop"];
const ALL_ESTILOS = ["Todos",...MAIN_ESTILOS,"Otros"];

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
let currentTab = 'home';
let weekOffset = 0;
let calFilter = 'Todos';
let hiddenSchools = new Set();
let schoolsFilter = 'Todos';
let favorites = JSON.parse(localStorage.getItem('rl_favs') || '[]');
let currentModalSchoolId = null;

function saveFavs() { localStorage.setItem('rl_favs', JSON.stringify(favorites)); }
function isFav(id) { return favorites.includes(id); }
function toggleFav(id) {
  if (isFav(id)) {
    favorites = favorites.filter(f => f !== id);
    showToast('Eliminado de favoritos');
  } else {
    favorites.push(id);
    showToast('Añadido a favoritos ★');
  }
  saveFavs();
  renderFavPage();
  renderSchoolsList();
}

/* ════════════════════════════════════════
   HELPERS
════════════════════════════════════════ */
function getSchool(id) { return SCHOOLS.find(s => s.id === id); }
function getMonday(offset) {
  const d = new Date();
  d.setHours(0,0,0,0);
  const day = d.getDay(); // 0=Sun,1=Mon,...,6=Sat
  const diff = (day === 0 ? -6 : 1 - day); // days to subtract to get to Monday
  d.setDate(d.getDate() + diff + offset * 7);
  return d;
}
function fmtDate(d) { return d.toLocaleDateString('es-PE',{day:'numeric',month:'short'}); }
function todayDayNum() {
  const d = new Date().getDay();
  return d === 0 ? 7 : d;
}
function matchCalFilter(cls) {
  if (calFilter === 'Todos') return true;
  if (calFilter === 'Otros') return !MAIN_ESTILOS.some(e => cls.estilo.toLowerCase().includes(e.toLowerCase()));
  return cls.estilo.toLowerCase().includes(calFilter.toLowerCase());
}
function matchSchoolFilter(school) {
  if (schoolsFilter === 'Todos') return true;
  if (schoolsFilter === 'Otros') return !school.estilos.some(e => MAIN_ESTILOS.some(m => e.toLowerCase().includes(m.toLowerCase())));
  return school.estilos.some(e => e.toLowerCase().includes(schoolsFilter.toLowerCase()));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

/* ════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════ */
function showTab(tab) {
  if (tab === currentTab && tab !== 'home') {
    document.getElementById('scroll-area').scrollTo(0,0);
    return;
  }
  currentTab = tab;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`page-${tab}`).classList.add('active');
  const navTab = document.querySelector(`[data-tab="${tab}"]`);
  if (navTab) navTab.classList.add('active');
  document.getElementById('scroll-area').scrollTo(0,0);

  if (tab === 'calendario') renderCalendar();
  if (tab === 'favs') renderFavPage();
  if (tab === 'escuelas') renderSchoolsList();
  closeSearch();
}

function goHome() { showTab('home'); }

function showDetail(schoolId) {
  currentTab = 'detail';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-detail').classList.add('active');
  document.getElementById('scroll-area').scrollTo(0,0);
  renderDetail(schoolId);
}

/* ════════════════════════════════════════
   HOME
════════════════════════════════════════ */
function renderHome() {
  renderTodayStrip();
  renderSchoolsStrip();
}

function renderTodayStrip() {
  const strip = document.getElementById('today-strip');
  const todayNum = todayDayNum();
  const todayClasses = CLASSES
    .filter(c => c.day === todayNum)
    .sort((a,b) => a.hora.localeCompare(b.hora));

  if (todayClasses.length === 0) {
    strip.innerHTML = '<div class="no-today">No hay clases registradas para hoy</div>';
    return;
  }
  strip.innerHTML = '';
  todayClasses.slice(0, 8).forEach(cls => {
    const sch = getSchool(cls.sid);
    const card = document.createElement('div');
    card.className = 'today-card';
    card.style.setProperty('--sc', sch.color);
    card.innerHTML = `
      <div class="today-card-school">${sch.name.split(' ').slice(0,2).join(' ')}</div>
      <div class="today-card-time">${cls.hora}</div>
      <div class="today-card-estilo">${cls.estilo}</div>
      <div class="today-card-nivel">${cls.nivel}</div>
      <div class="today-card-sede">${cls.sede}</div>`;
    card.addEventListener('click', () => openModal(cls, sch));
    strip.appendChild(card);
  });
}

function renderSchoolsStrip() {
  const strip = document.getElementById('schools-strip');
  strip.innerHTML = '';
  SCHOOLS.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'school-mini';
    card.style.setProperty('--sc', s.color);
    card.innerHTML = `
      <div class="fav-star" title="${isFav(s.id) ? 'Quitar favorito' : 'Guardar'}">${isFav(s.id) ? '★' : '☆'}</div>
      <div class="sm-rank">${String(i+1).padStart(2,'0')}</div>
      <div class="sm-name">${s.name}</div>
      <div class="sm-sedes">📍 ${s.sedes.slice(0,2).join(', ')}${s.sedes.length>2?'…':''}</div>
      <div class="sm-tags">${s.estilos.slice(0,3).map(e=>`<span class="sm-tag">${e}</span>`).join('')}</div>`;
    card.querySelector('.fav-star').addEventListener('click', e => { e.stopPropagation(); toggleFav(s.id); renderSchoolsStrip(); });
    card.addEventListener('click', () => showDetail(s.id));
    strip.appendChild(card);
  });
}

/* ════════════════════════════════════════
   SCHOOLS LIST
════════════════════════════════════════ */
function renderEstiloChips() {
  const cont = document.getElementById('estilo-chips');
  cont.innerHTML = '';
  ALL_ESTILOS.forEach(e => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (schoolsFilter === e ? ' on' : '');
    chip.textContent = e;
    chip.addEventListener('click', () => { schoolsFilter = e; renderEstiloChips(); renderSchoolsList(); });
    cont.appendChild(chip);
  });
}

function renderSchoolsList() {
  const list = document.getElementById('schools-list');
  list.innerHTML = '';
  const filtered = SCHOOLS.filter(matchSchoolFilter);
  document.getElementById('schools-count').textContent = `${filtered.length} escuelas encontradas`;
  filtered.forEach((s, i) => {
    const row = document.createElement('div');
    row.className = 'school-row';
    row.style.setProperty('--sc', s.color);
    row.innerHTML = `
      <div class="school-row-num">${String(SCHOOLS.indexOf(s)+1).padStart(2,'0')}</div>
      <div class="school-row-body">
        <div class="school-row-name">${s.name}</div>
        <div class="school-row-sedes">📍 ${s.sedes.join(' · ')}</div>
        <div class="school-row-tags">${s.estilos.slice(0,4).map(e=>`<span class="sm-tag">${e}</span>`).join('')}</div>
      </div>
      <div class="school-row-right">
        <span class="school-row-fav">${isFav(s.id) ? '★' : '☆'}</span>
        <span class="school-row-chevron">›</span>
      </div>`;
    row.querySelector('.school-row-fav').addEventListener('click', e => { e.stopPropagation(); toggleFav(s.id); renderSchoolsList(); });
    row.addEventListener('click', () => showDetail(s.id));
    list.appendChild(row);
  });
}

/* ════════════════════════════════════════
   DETAIL
════════════════════════════════════════ */
function renderDetail(schoolId) {
  const s = getSchool(schoolId);
  const schoolClasses = CLASSES.filter(c => c.sid === schoolId).sort((a,b) => a.day - b.day || a.hora.localeCompare(b.hora));
  const cont = document.getElementById('detail-content');
  cont.innerHTML = `
    <div class="detail-hero">
      <div class="detail-hero-bg" style="background:radial-gradient(ellipse 80% 80% at 70% 30%, ${s.color}33 0%, transparent 70%)"></div>
      <button class="detail-back" onclick="showTab('escuelas')">← Escuelas</button>
      <div class="detail-color-bar" style="background:${s.color}"></div>
      <div class="detail-name">${s.name}</div>
      <div class="detail-sedes">📍 ${s.sedes.join(' · ')}</div>
      <div class="detail-nota">${s.nota}</div>
      <div class="detail-actions">
        <button class="detail-action-btn" id="det-fav-btn" onclick="toggleFav(${s.id}); renderDetail(${s.id})">
          <span>${isFav(s.id) ? '★' : '☆'}</span>
          <span>${isFav(s.id) ? 'Guardado' : 'Guardar'}</span>
        </button>
        ${s.tel ? `<button class="detail-action-btn" onclick="window.location='tel:${s.tel}'">📞 Llamar</button>` : ''}
        ${s.tel ? `<a class="detail-action-btn" href="https://wa.me/${s.tel.replace(/\D/g,'')}" target="_blank" style="text-decoration:none">💬 WhatsApp</a>` : ''}
        ${s.web ? `<button class="detail-action-btn" onclick="window.open('https://${s.web}','_blank')">🌐 Web</button>` : ''}
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Estilos</div>
      <div class="estilo-pills">${s.estilos.map(e=>`<span class="estilo-pill">${e}</span>`).join('')}</div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Sedes</div>
      ${s.sedes.map(sede => `<div class="sede-chip"><div class="sede-chip-dot" style="background:${s.color}"></div>${sede}</div>`).join('')}
    </div>
    <div class="detail-section" style="padding-bottom:1.5rem">
      <div class="detail-section-title">Clases semanales (${schoolClasses.length} clases)</div>
      <div class="detail-classes">${schoolClasses.map(cls => `
        <div class="detail-class-card" style="--sc:${s.color}">
          <div class="dc-row1">
            <div class="dc-time">${cls.hora}</div>
            <div class="dc-day">${DAYS_ES[cls.day-1]}</div>
          </div>
          <div class="dc-estilo">${cls.estilo}</div>
          <div class="dc-meta">${cls.nivel} · ${cls.prof}</div>
          <div class="dc-meta" style="margin-top:3px">${cls.sede}</div>
        </div>`).join('')}
      </div>
    </div>`;
}

/* ════════════════════════════════════════
   CALENDAR
════════════════════════════════════════ */
function renderCalFilters() {
  const cont = document.getElementById('cal-filters');
  if (cont.children.length > 0) return;
  ALL_ESTILOS.forEach(e => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (calFilter === e ? ' on' : '');
    chip.textContent = e;
    chip.dataset.estilo = e;
    chip.addEventListener('click', () => {
      calFilter = e;
      cont.querySelectorAll('.chip').forEach(c => c.classList.toggle('on', c.dataset.estilo === e));
      renderCalGrid();
    });
    cont.appendChild(chip);
  });
}

function renderCalLegend() {
  const el = document.getElementById('cal-legend');
  el.innerHTML = '';
  SCHOOLS.forEach(s => {
    const item = document.createElement('div');
    item.className = 'leg' + (hiddenSchools.has(s.id) ? ' off' : '');
    item.innerHTML = `<div class="leg-dot" style="background:${s.color}"></div><span>${s.name.split(' ')[0]}</span>`;
    item.addEventListener('click', () => {
      if (hiddenSchools.has(s.id)) hiddenSchools.delete(s.id);
      else hiddenSchools.add(s.id);
      item.classList.toggle('off');
      renderCalGrid();
    });
    el.appendChild(item);
  });
}

function renderCalGrid() {
  const monday = getMonday(weekOffset);
  const sunday = new Date(monday); sunday.setDate(sunday.getDate() + 6);
  document.getElementById('cal-week-range').textContent = `${fmtDate(monday)} — ${fmtDate(sunday)}`;
  const today = new Date(); today.setHours(0,0,0,0);
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  for (let d = 0; d < 7; d++) {
    const dayDate = new Date(monday); dayDate.setDate(monday.getDate() + d);
    const isToday = dayDate.getTime() === today.getTime() && weekOffset === 0;
    const col = document.createElement('div'); col.className = 'day-col';
    const head = document.createElement('div');
    head.className = 'day-head' + (isToday ? ' today' : '');
    head.innerHTML = `${DAYS_ES[d]}<br>${dayDate.getDate()}`;
    col.appendChild(head);
    const body = document.createElement('div'); body.className = 'day-body';
    const dayCls = CLASSES
      .filter(c => c.day === d+1 && !hiddenSchools.has(c.sid) && matchCalFilter(c))
      .sort((a,b) => a.hora.localeCompare(b.hora));
    if (dayCls.length === 0) {
      const emp = document.createElement('div'); emp.className = 'no-class'; emp.textContent = '—';
      body.appendChild(emp);
    } else {
      dayCls.forEach(cls => {
        const sch = getSchool(cls.sid);
        const pill = document.createElement('div');
        pill.className = 'cpill';
        pill.style.setProperty('--pc', sch.color);
        pill.innerHTML = `<div class="cpill-s">${sch.name.split(' ')[0]}</div><div class="cpill-t">${cls.hora}</div><div class="cpill-e">${cls.estilo}</div><div class="cpill-n">${cls.nivel}</div>`;
        pill.addEventListener('click', () => openModal(cls, sch));
        body.appendChild(pill);
      });
    }
    col.appendChild(body);
    grid.appendChild(col);
  }
}

function renderCalendar() {
  renderCalFilters();
  if (!document.getElementById('cal-legend').children.length) renderCalLegend();
  renderCalGrid();
}

document.getElementById('cal-prev').addEventListener('click', () => { weekOffset--; renderCalGrid(); });
document.getElementById('cal-next').addEventListener('click', () => { weekOffset++; renderCalGrid(); });

/* ════════════════════════════════════════
   FAVORITES
════════════════════════════════════════ */
function renderFavPage() {
  const cont = document.getElementById('fav-content');
  document.getElementById('fav-count').textContent = `${favorites.length} escuela${favorites.length !== 1 ? 's' : ''} guardada${favorites.length !== 1 ? 's' : ''}`;
  if (favorites.length === 0) {
    cont.innerHTML = `<div class="fav-empty"><div class="fav-empty-icon">★</div><div class="fav-empty-text">Aún no tienes favoritos.<br>Guarda escuelas tocando ☆ en cualquier vista.</div></div>`;
    return;
  }
  const favSchools = favorites.map(id => getSchool(id)).filter(Boolean);
  cont.innerHTML = `<div class="fav-grid">${favSchools.map(s => `
    <div class="fav-card" style="--sc:${s.color}" onclick="showDetail(${s.id})">
      <span class="fav-remove" onclick="event.stopPropagation();toggleFav(${s.id})">✕</span>
      <div class="fav-card-name">${s.name}</div>
      <div class="fav-card-sedes">${s.sedes.slice(0,2).join(' · ')}</div>
      <div class="fav-card-tags">${s.estilos.slice(0,3).map(e=>`<span class="sm-tag">${e}</span>`).join('')}</div>
    </div>`).join('')}</div>`;
}

/* ════════════════════════════════════════
   MODAL
════════════════════════════════════════ */
function openModal(cls, sch) {
  document.getElementById('modal-stripe').style.background = sch.color;
  document.getElementById('modal-title').textContent = `${cls.estilo} · ${cls.hora}`;
  document.getElementById('modal-school-name').textContent = sch.name;
  currentModalSchoolId = sch.id;
  document.getElementById('modal-rows').innerHTML = `
    <div class="mrow"><span class="mk">Día</span><span class="mv">${DAYS_ES[cls.day-1]}</span></div>
    <div class="mrow"><span class="mk">Horario</span><span class="mv">${cls.hora} hrs</span></div>
    <div class="mrow"><span class="mk">Nivel</span><span class="mv">${cls.nivel}</span></div>
    <div class="mrow"><span class="mk">Profesor</span><span class="mv">${cls.prof}</span></div>
    <div class="mrow"><span class="mk">Sede</span><span class="mv">${cls.sede}</span></div>
    ${sch.tel ? `<div class="mrow"><span class="mk">Tel</span><span class="mv"><a href="https://wa.me/${sch.tel.replace(/\D/g,'')}" target="_blank" style="color:${sch.color};text-decoration:none;">📱 ${sch.tel} (WhatsApp)</a></span></div>` : ''}
    ${sch.web ? `<div class="mrow"><span class="mk">Web</span><span class="mv"><a href="https://${sch.web}" target="_blank" style="color:${sch.color};text-decoration:none;">${sch.web}</a></span></div>` : ''}`;
  document.getElementById('modal-detail-btn').onclick = () => { closeModal(); showDetail(sch.id); };
  document.getElementById('class-modal').classList.add('open');
}

function closeModal(event) {
  if (!event || event.target === document.getElementById('class-modal')) {
    document.getElementById('class-modal').classList.remove('open');
  }
}

/* ════════════════════════════════════════
   SEARCH
════════════════════════════════════════ */
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) { closeSearch(); return; }
  const matches = [];
  SCHOOLS.forEach(s => {
    if (s.name.toLowerCase().includes(q) ||
        s.sedes.some(d => d.toLowerCase().includes(q)) ||
        s.estilos.some(e => e.toLowerCase().includes(q))) {
      matches.push({ type:'school', data:s });
    }
  });
  CLASSES.forEach(cls => {
    const sch = getSchool(cls.sid);
    if (cls.estilo.toLowerCase().includes(q) || cls.nivel.toLowerCase().includes(q) || cls.prof.toLowerCase().includes(q)) {
      matches.push({ type:'class', data:cls, school:sch });
    }
  });
  if (matches.length === 0) {
    searchResults.innerHTML = '<div class="sr-item"><div class="sr-info"><div class="sr-name">Sin resultados</div><div class="sr-meta">Intenta con otro término</div></div></div>';
    searchResults.classList.add('open');
    return;
  }
  const unique = matches.slice(0, 10);
  searchResults.innerHTML = unique.map((m, i) => {
    if (m.type === 'school') {
      return `<div class="sr-item" data-i="${i}"><div class="sr-dot" style="background:${m.data.color}"></div><div class="sr-info"><div class="sr-name">${m.data.name}</div><div class="sr-meta">${m.data.sedes.join(' · ')}</div></div></div>`;
    } else {
      return `<div class="sr-item" data-i="${i}"><div class="sr-dot" style="background:${m.school.color}"></div><div class="sr-info"><div class="sr-name">${m.data.estilo} – ${m.data.hora}</div><div class="sr-meta">${m.school.name} · ${DAYS_ES[m.data.day-1]} · ${m.data.sede}</div></div></div>`;
    }
  }).join('');
  searchResults.classList.add('open');
  searchResults.querySelectorAll('.sr-item').forEach((el, i) => {
    el.addEventListener('click', () => {
      const m = unique[i];
      closeSearch();
      searchInput.value = '';
      if (m.type === 'school') showDetail(m.data.id);
      else { showTab('calendario'); setTimeout(() => openModal(m.data, m.school), 300); }
    });
  });
});

function closeSearch() {
  searchResults.classList.remove('open');
  searchResults.innerHTML = '';
}

document.addEventListener('click', e => {
  if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) closeSearch();
});

/* ════════════════════════════════════════
   PWA SERVICE WORKER
════════════════════════════════════════ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/ritmo-lima/sw.js').catch(() => {});
  });
}

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
renderEstiloChips();
renderHome();
</script>
